{% extends "base.html" %}
{% block title %}로그인 - 운명 API{% endblock %}

{% block content %}
<section class="max-w-sm mx-auto py-16 md:py-24 text-center">
    <h1 class="text-2xl md:text-3xl font-bold mb-3 text-slate-800">로그인</h1>
    <p class="text-slate-500 text-sm mb-8">카카오 계정으로 간편하게 시작하세요</p>

    <a href="/auth/login"
       class="inline-flex items-center justify-center gap-2 w-full py-3.5 rounded-xl font-semibold transition transform hover:scale-[1.02] active:scale-[0.98]"
       style="background-color: #FEE500; color: #191919;">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">

                  fill="#191919"/>
        </svg>
        카카오 로그인

    <p class="mt-6 text-slate-400 text-xs">
        로그인하면 AI 정밀 상세 풀이를 이용할 수 있습니다
    </p>
</section>
{% endblock %}
